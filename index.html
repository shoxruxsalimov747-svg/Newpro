<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Parking - Bo'sh Joylar</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <header>
        <div class="container">
            <h1><i class="fas fa-car-side"></i> Smart Parking</h1>
        </div>
    </header>

    <main class="container">
        <section class="parking-status">
            <h2>Avtoturargoh Statusi</h2>
            <div class="status-summary">
                <span class="total-spots"><i class="fas fa-parking"></i> Jami: 50</span>
                <span class="available-spots"><i class="fas fa-check-circle"></i> Bo'sh: <span id="available-count"></span></span>
                <span class="occupied-spots"><i class="fas fa-times-circle"></i> Band: <span id="occupied-count"></span></span>
            </div>
        </section>

        <section class="parking-map">
            <h3>Turargoh Xaritasi (A bo'lim)</h3>
            <div id="parking-grid">
                </div>
        </section>

    </main>

    <footer>
        <div class="container">
            <p>&copy; 2025 Smart Parking | Barcha huquqlar himoyalangan.</p>
        </div>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
